<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視覺助理 - 語音模式 (縮小照片、放大按鍵版)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 20px; color: #00d4ff; }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }
        .video-container {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        video, canvas {
            width: 50%; /* 將照片視窗寬度設為原本的一半 */
            height: auto; /* 保持比例 */
            border-radius: 8px;
            background: #0f0f23;
            margin-bottom: 15px; /* 在照片和按鈕之間增加一些間距 */
        }
        .controls {
            display: flex;
            gap: 15px; /* 增加按鈕之間的間距 */
            margin: 15px 0;
        }
        button {
            flex: 1;
            padding: 25px; /* 增加 padding 以放大按鈕 */
            border: none;
            border-radius: 12px; /* 增加 border-radius 以獲得更圓潤的外觀 */
            cursor: pointer;
            font-size: 20px; /* 增加字體大小 */
            font-weight: 700; /* 增加字體粗細 */
            transition: all 0.2s;
        }
        #captureBtn { background: #00d4ff; color: #1a1a2e; }
        #askBtn { background: #7c3aed; color: white; }
        button:hover { transform: scale(1.03); } /* 稍微減小 hover 時的放大比例 */
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status {
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 16px; /* 增加字體大小 */
            font-weight: bold;
        }
        .loading { background: #fbbf24; color: #1a1a2e; }
        .error { background: #ef4444; color: white; }
        .success { background: #22c55e; color: white; }

        .api-key-container {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
            padding: 15px;
            background: #16213e;
            border-radius: 12px;
        }
        .api-key-container label {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
            font-size: 16px; /* 增加字體大小 */
        }
        .api-key-container input {
            width: 100%;
            padding: 15px; /* 增加 padding */
            border: none;
            border-radius: 8px;
            background: #0f0f23;
            color: #eee;
            font-size: 16px; /* 增加字體大小 */
        }
        .get-api-key-btn {
            display: inline-block;
            margin-bottom: 10px;
            padding: 8px 16px; /* 增加 padding */
            background: #4285f4;
            color: white;
            text-decoration: none;
            border-radius: 6px; /* 增加 border-radius */
            font-size: 14px; /* 增加字體大小 */
        }
    </style>
</head>
<body>
    <h1>視覺助理</h1>
    
    <div class="container">
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
            
            <div class="controls">
                <button id="captureBtn">1. 擷取畫面</button>
                <button id="askBtn" disabled>2. 辨識並朗讀</button>
            </div>
            
            <div id="status">準備就緒</div>
        </div>
    </div>

    <div class="api-key-container">
        <a href="https://aistudio.google.com/api-keys" target="_blank" class="get-api-key-btn">獲取 API Key</a>
        <label for="apiKey">Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="在此輸入 API Key">
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const askBtn = document.getElementById('askBtn');
        const status = document.getElementById('status');
        const apiKeyInput = document.getElementById('apiKey');

        let capturedImage = null;
        let modelName = 'gemini-1.5-flash'; // 建議使用 flash 以維持回應速度

        function speak(text) {
            // 停止目前正在進行的朗讀
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            window.speechSynthesis.speak(utterance);
        }

        async function initWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
            } catch (err) {
                status.textContent = '相機啟動失敗：' + err.message;
                status.className = 'error';
            }
        }

        captureBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImage = canvas.toDataURL('image/jpeg', 0.85);
            askBtn.disabled = false;
            status.textContent = '畫面已擷取';
            status.className = 'success';
            speak('已擷取畫面');
        });

        async function askGemini() {
            const apiKey = apiKeyInput.value.trim();
            if (!capturedImage || !apiKey) {
                status.textContent = '請先擷取圖片並填寫 API Key';
                status.className = 'error';
                return;
            }
            
            askBtn.disabled = true;
            captureBtn.disabled = true;
            status.textContent = '辨識中...';
            status.className = 'loading';
            speak('正在辨識內容');

            const base64Data = capturedImage.split(',')[1];
            const payload = {
                contents: [{
                    parts: [
                        { text: "這張圖片裡有什麼？請用繁體中文簡單描述，不超過兩句話。" },
                        { inline_data: { mime_type: 'image/jpeg', data: base64Data } }
                    ]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error?.message || 'API Error');

                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || '抱歉，我無法理解這張圖片。';
                
                status.textContent = '辨識完成';
                status.className = 'success';
                
                // 自動語音輸出
                speak(resultText);

            } catch (err) {
                console.error(err);
                status.textContent = '發生錯誤';
                status.className = 'error';
                speak('辨識發生錯誤，請檢查網路或金鑰');
            } finally {
                askBtn.disabled = false;
                captureBtn.disabled = false;
            }
        }

        askBtn.addEventListener('click', askGemini);
        initWebcam();
    </script>
</body>
</html>
