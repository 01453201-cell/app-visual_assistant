<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視覺助理 - 語音精簡版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 20px; color: #00d4ff; font-size: 24px; }
        
        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-container {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        /* 照片視窗：強制縮小至 50% 寬度並置中 */
        video, canvas {
            width: 50%; 
            max-width: 300px;
            height: auto;
            border-radius: 8px;
            background: #0f0f23;
            margin: 0 auto 20px auto;
            display: block;
            border: 2px solid #30475e;
        }

        /* 放大按鈕區 */
        .controls {
            display: flex;
            flex-direction: column; /* 改為垂直排列讓按鈕更大 */
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 30px 10px; /* 極大化點擊區域 */
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 22px; /* 字體放大 */
            font-weight: bold;
            transition: transform 0.1s, opacity 0.2s;
        }

        #captureBtn { background: #00d4ff; color: #1a1a2e; }
        #askBtn { background: #7c3aed; color: white; }
        
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        #status {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        .loading { background: #fbbf24; color: #1a1a2e; }
        .error { background: #ef4444; color: white; }
        .success { background: #22c55e; color: white; }

        .api-key-container {
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
            padding: 20px;
            background: #16213e;
            border-radius: 12px;
        }
        .api-key-container label {
            display: block;
            margin-bottom: 10px;
            color: #00d4ff;
        }
        .api-key-container input {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            background: #0f0f23;
            color: #eee;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>視覺助理</h1>
    
    <div class="container">
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
            
            <div class="controls">
                <button id="captureBtn">1. 擷取畫面</button>
                <button id="askBtn" disabled>2. 開始辨識 (自動朗讀)</button>
            </div>
            
            <div id="status">準備就緒</div>
        </div>
    </div>

    <div class="api-key-container">
        <label for="apiKey">Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="在此輸入金鑰...">
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const askBtn = document.getElementById('askBtn');
        const status = document.getElementById('status');
        const apiKeyInput = document.getElementById('apiKey');

        let capturedImage = null;

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            window.speechSynthesis.speak(utterance);
        }

        async function initWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
            } catch (err) {
                status.textContent = '相機啟動失敗';
                status.className = 'error';
            }
        }

        captureBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImage = canvas.toDataURL('image/jpeg', 0.85);
            askBtn.disabled = false;
            status.textContent = '已擷取畫面';
            status.className = 'success';
            speak('已擷取');
        });

        async function askGemini() {
            const apiKey = apiKeyInput.value.trim();
            if (!capturedImage || !apiKey) {
                status.textContent = '請輸入 API Key';
                status.className = 'error';
                return;
            }
            
            askBtn.disabled = true;
            status.textContent = '辨識中...';
            status.className = 'loading';
            speak('正在辨識');

            const base64Data = capturedImage.split(',')[1];
            
            // 提示詞直接寫在程式碼裡，畫面上不會出現
            const payload = {
                contents: [{
                    parts: [
                        { text: "這張圖片裡有什麼？請用繁體中文簡單描述，兩句話以內。" },
                        { inline_data: { mime_type: 'image/jpeg', data: base64Data } }
                    ]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || '無法辨識';
                
                status.textContent = '辨識完成';
                status.className = 'success';
                speak(resultText);

            } catch (err) {
                status.textContent = '錯誤，請檢查網路';
                status.className = 'error';
                speak('發生錯誤');
            } finally {
                askBtn.disabled = false;
            }
        }

        askBtn.addEventListener('click', askGemini);
        initWebcam();
    </script>
</body>
</html>
